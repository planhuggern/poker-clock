<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holtebu Apps</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0d0d0f;
    color: #e8e0d0;
    font-family: Georgia, serif;
  }

  h1 {
    font-size: 0.8rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 48px;
  }

  .apps {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .app-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 36px 40px;
    background: #13131a;
    border: 1px solid #2a2a3a;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, transform 0.15s;
    width: 200px;
  }

  .app-card:hover {
    border-color: #c9a84c;
    transform: translateY(-3px);
  }

  .app-icon { font-size: 2.8rem; line-height: 1; }
  .app-name { font-size: 1rem; color: #e8e0d0; letter-spacing: 1px; }
  .app-desc { font-size: 0.72rem; color: #555; text-align: center; line-height: 1.5; }
</style>
</head>
<body>

<h1>Holtebu Apps</h1>

<div class="apps">
  <a class="app-card" href="{{ clock_url }}">
    <div class="app-icon">🃏</div>
    <div class="app-name">Poker Clock</div>
    <div class="app-desc">Turneringsklokke med blindsstruktur og spillerstyring</div>
  </a>

  <a class="app-card" href="{{ oslo_url }}">
    <div class="app-icon">🗺️</div>
    <div class="app-name">Oslo Conquest</div>
    <div class="app-desc">Flerspiller strategispill på kartet over Oslo</div>
  </a>
</div>

</body>
</html>
