# Referansefil – bootstrap.sh genererer den faktiske konfigurasjonen.
# Ingen stripPrefix på Django: mottar full path og håndterer basepath via portal/urls.py.
# Go-serveren: strip /pokerklokke slik at den ser /api/... direkte.

http:
  routers:
    poker-clock:
      rule: "Host(`espen.holtebu.eu`) && PathPrefix(`/pokerklokke`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: poker-clock-backend
      priority: 10

    holtebu-server:
      rule: "Host(`espen.holtebu.eu`) && PathPrefix(`/pokerklokke/api/`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: holtebu-server-backend
      middlewares:
        - strip-pokerklokke
      priority: 20

  services:
    poker-clock-backend:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:8000"

    holtebu-server-backend:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:8082"

  middlewares:
    strip-pokerklokke:
      stripPrefix:
        prefixes:
          - "/pokerklokke"
