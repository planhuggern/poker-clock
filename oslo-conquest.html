<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oslo Conquest</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #13131a;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --red: #c0392b;
    --blue: #1a6b9a;
    --green: #1a7a4a;
    --purple: #6b3fa0;
    --orange: #c0692b;
    --cyan: #1a8a8a;
    --text: #e8e0d0;
    --text-muted: #888070;
    --shadow: rgba(0,0,0,0.7);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #lobby {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #0d0d0f 70%);
    z-index: 100;
  }

  .lobby-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--gold);
    padding: 40px 48px;
    width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
  }

  .lobby-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  h1.title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 2rem;
    color: var(--gold);
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .subtitle {
    text-align: center;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 32px;
    font-size: 1rem;
  }

  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }

  input, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--gold); }

  .btn {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.9rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn:hover { background: var(--gold); color: var(--bg); }
  .btn.primary { background: var(--gold); color: var(--bg); }
  .btn.primary:hover { background: var(--gold-light); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  .ws-status {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.8rem; color: var(--text-muted);
    margin-bottom: 16px;
  }
  .ws-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }
  .ws-dot.connected { background: #2ecc71; }

  /* GAME UI */
  #game-container {
    position: fixed; inset: 0;
    display: none;
  }

  #map-container {
    position: absolute;
    top: 60px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    background: #0d1520;
    cursor: grab;
  }
  #map-container.grabbing { cursor: grabbing; }

  #oslo-svg {
    position: absolute;
    transform-origin: 0 0;
    user-select: none;
  }

  .svg-district { transition: filter 0.2s; }
  .svg-district:hover { filter: brightness(1.25); }

  .svg-territory {
    cursor: pointer;
    transition: filter 0.15s;
  }
  .svg-territory:hover { filter: brightness(1.4) drop-shadow(0 0 6px rgba(201,168,76,0.7)); }
  .svg-territory.selected { filter: brightness(1.5) drop-shadow(0 0 10px rgba(255,215,0,0.9)); }

  .terr-label {
    font-family: 'Crimson Pro', serif;
    font-size: 8px;
    fill: #c9a84c;
    pointer-events: none;
    dominant-baseline: middle;
    text-anchor: middle;
  }
  .terr-units {
    font-family: 'Crimson Pro', serif;
    font-size: 9px;
    fill: #e8e0d0;
    pointer-events: none;
    dominant-baseline: middle;
    text-anchor: middle;
    font-weight: 600;
  }
  .district-label {
    font-family: 'Cinzel Decorative', serif;
    font-size: 8px;
    fill: rgba(255,255,255,0.22);
    letter-spacing: 1.5px;
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: middle;
    text-transform: uppercase;
  }
  .checkpoint-label {
    font-family: 'Cinzel Decorative', serif;
    font-size: 9px;
    fill: #ffd700;
    pointer-events: none;
    text-anchor: middle;
  }
  .adj-line {
    stroke: #2a2a3a;
    stroke-width: 1;
    opacity: 0.5;
    pointer-events: none;
  }
  .adj-line.highlight {
    stroke: rgba(201,168,76,0.4);
    stroke-width: 1.5;
  }

  #map-tooltip {
    position: fixed;
    background: rgba(10,10,20,0.97);
    border: 1px solid #c9a84c;
    color: #e8e0d0;
    font-family: 'Crimson Pro', serif;
    font-size: 13px;
    padding: 8px 12px;
    pointer-events: none;
    display: none;
    z-index: 50;
    line-height: 1.6;
  }

  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(180deg, rgba(13,13,15,0.97) 0%, rgba(13,13,15,0.8) 100%);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px;
    gap: 16px;
    z-index: 10;
  }

  .hud-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1rem;
    color: var(--gold);
    margin-right: 8px;
  }

  .player-chips {
    display: flex; gap: 8px; flex: 1;
  }

  .player-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 12px;
    border: 1px solid transparent;
    font-size: 0.85rem;
    transition: all 0.2s;
    cursor: default;
  }
  .player-chip.active {
    border-color: var(--gold);
    background: rgba(201,168,76,0.1);
  }
  .player-chip .chip-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .player-chip .chip-money { color: var(--gold-light); margin-left: 4px; }
  .player-chip .chip-units { color: #88aacc; margin-left: 4px; }

  #action-panel {
    position: absolute;
    bottom: 0; right: 0;
    width: 320px;
    background: rgba(13,13,15,0.97);
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
    padding: 16px;
    z-index: 10;
    max-height: 50vh;
    overflow-y: auto;
  }

  .panel-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }

  .territory-info { margin-bottom: 12px; }
  .territory-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
  .territory-district { font-size: 0.8rem; color: var(--text-muted); font-style: italic; }
  .territory-stats { display: flex; gap: 12px; margin-top: 8px; font-size: 0.85rem; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }

  .action-buttons { display: flex; flex-direction: column; gap: 8px; }
  .action-btn {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    display: flex; justify-content: space-between; align-items: center;
  }
  .action-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .action-btn .price { color: var(--gold); font-size: 0.85rem; }

  #log-panel {
    position: absolute;
    bottom: 0; left: 0;
    width: 280px;
    background: rgba(13,13,15,0.93);
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 12px;
    z-index: 10;
    height: 200px;
    display: flex; flex-direction: column;
  }

  .log-entries {
    flex: 1; overflow-y: auto;
    display: flex; flex-direction: column-reverse;
    gap: 4px;
  }

  .log-entry {
    font-size: 0.8rem;
    color: var(--text-muted);
    line-height: 1.4;
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .log-entry.important { color: var(--gold-light); }
  .log-entry.combat { color: #e87070; }
  .log-entry.buy { color: #70e8a0; }

  #turn-indicator {
    position: absolute;
    top: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(13,13,15,0.95);
    border: 1px solid var(--border);
    padding: 8px 24px;
    font-size: 0.9rem;
    z-index: 10;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  #dice-display {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(13,13,15,0.98);
    border: 1px solid var(--gold);
    padding: 24px 40px;
    text-align: center;
    z-index: 50;
    display: none;
  }

  .dice-title { font-family: 'Cinzel Decorative', serif; color: var(--gold); margin-bottom: 16px; font-size: 0.9rem; }
  .dice-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 8px; }
  .die {
    width: 48px; height: 48px;
    background: var(--surface2);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    font-weight: bold;
  }
  .die.attacker { border-color: var(--red); }
  .die.defender { border-color: var(--blue); }
  .dice-result { font-size: 0.9rem; color: var(--text-muted); margin-top: 8px; }

  #mission-card {
    position: absolute;
    top: 70px; right: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--gold);
    padding: 12px 16px;
    width: 220px;
    z-index: 10;
    cursor: pointer;
  }
  .mission-title { font-family: 'Cinzel Decorative', serif; font-size: 0.7rem; color: var(--gold); margin-bottom: 6px; }
  .mission-text { font-size: 0.85rem; line-height: 1.4; }
  .mission-hidden { font-style: italic; color: var(--text-muted); }

  #checkpoint-bar {
    position: absolute;
    top: 70px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 16px;
    background: rgba(13,13,15,0.95);
    border: 1px solid var(--border);
    padding: 8px 16px;
    z-index: 10;
    pointer-events: none;
  }

  .checkpoint {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.8rem; color: var(--text-muted);
  }
  .checkpoint.reached { color: var(--gold); }
  .checkpoint-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
  .checkpoint.reached .checkpoint-dot { background: var(--gold); }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--gold);
    padding: 32px;
    max-width: 400px;
    width: 90%;
    text-align: center;
  }

  .modal h2 {
    font-family: 'Cinzel Decorative', serif;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .modal p { margin-bottom: 16px; line-height: 1.6; }

  select option { background: var(--surface2); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  .end-game-modal .winner { font-size: 1.5rem; color: var(--gold-light); margin: 16px 0; }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="lobby-card">
    <h1 class="title">Oslo Conquest</h1>
    <p class="subtitle">Krig, handel og makt i Norges hjerte</p>

    <div class="ws-status">
      <div class="ws-dot" id="ws-dot"></div>
      <span id="ws-status-text">Ikke tilkoblet</span>
    </div>

    <div class="form-group">
      <label>WebSocket server</label>
      <input type="text" id="ws-url" value="ws://localhost:8000/ws/oslo-conquest/" placeholder="ws://...">
    </div>
    <button class="btn" onclick="connectWS()">Koble til server</button>

    <hr class="divider">

    <div class="form-group">
      <label>Ditt navn</label>
      <input type="text" id="player-name" placeholder="Ola Nordmann" maxlength="20">
    </div>

    <div class="form-group">
      <label>Rom-ID</label>
      <input type="text" id="room-id" placeholder="oslo-1" maxlength="20">
    </div>

    <button class="btn primary" onclick="createGame()">Opprett spill</button>
    <button class="btn" onclick="joinGame()">Bli med i spill</button>

    <hr class="divider">

    <button class="btn" onclick="startLocalGame()" style="border-color: #556; color: #aaa;">
      Spill lokalt (testing)
    </button>
  </div>
</div>

<!-- GAME -->
<div id="game-container">
  <div id="map-container"></div>

  <div id="hud">
    <span class="hud-title">Oslo Conquest</span>
    <div class="player-chips" id="player-chips"></div>
    <button class="btn" style="width:auto; padding: 6px 16px; font-size:0.75rem;" onclick="endTurn()">
      Avslutt tur →
    </button>
  </div>

  <div id="turn-indicator">Laster...</div>

  <div id="checkpoint-bar">
    <div class="checkpoint" id="cp-lorenskog">
      <div class="checkpoint-dot"></div> Lørenskog
    </div>
    <div class="checkpoint" id="cp-lysaker">
      <div class="checkpoint-dot"></div> Lysaker
    </div>
    <div class="checkpoint" id="cp-kolbotn">
      <div class="checkpoint-dot"></div> Kolbotn
    </div>
  </div>

  <div id="log-panel">
    <div class="panel-title">Hendelseslogg</div>
    <div class="log-entries" id="log-entries"></div>
  </div>

  <div id="action-panel">
    <div class="panel-title">Handlinger</div>
    <div id="action-content">
      <p style="color: var(--text-muted); font-style: italic; font-size: 0.9rem;">Velg et område på kartet</p>
    </div>
  </div>

  <div id="mission-card">
    <div class="mission-title">🎯 Ditt oppdrag</div>
    <div class="mission-text mission-hidden" id="mission-text">Klikk for å se</div>
  </div>

  <div id="dice-display">
    <div class="dice-title">Kampoppgjør</div>
    <div style="margin-bottom:8px; font-size:0.85rem; color: var(--text-muted);">
      <span id="attacker-name">Angriper</span> vs <span id="defender-name">Forsvarer</span>
    </div>
    <div class="dice-row" id="attacker-dice"></div>
    <div style="font-size:0.75rem; color:var(--red); margin-bottom:4px;">↑ Angriper</div>
    <div class="dice-row" id="defender-dice"></div>
    <div style="font-size:0.75rem; color:var(--blue); margin-bottom:12px;">↑ Forsvarer</div>
    <div class="dice-result" id="dice-result"></div>
    <button class="btn" style="margin-top:12px;" onclick="closeDice()">Fortsett</button>
  </div>
  <div id="map-tooltip"></div>
</div>

<script>

const PLAYER_COLORS = ['#c0392b','#1a6b9a','#1a7a4a','#c0692b','#6b3fa0','#1a8a8a'];

function checkDistrictOwnership(player, gs, districtIds) {
  return districtIds.every(did => {
    const terrs = TERRITORIES.filter(t => t.district === did);
    return terrs.every(t => gs.territories[t.id]?.owner === player.id);
  });
}

let gameState = null;
let myPlayerId = null;
let selectedTerritory = null;
let missionRevealed = false;
let ws = null;

function createInitialGameState(players) {
  const territories = {};
  for (const t of TERRITORIES) {
    territories[t.id] = {
      id: t.id,
      owner: null,
      units: t.neutralUnits,
    };
  }

  const missions = [...MISSIONS];
  const shuffledMissions = missions.sort(() => Math.random() - 0.5);

  const ps = players.map((p, i) => {
    const mission = shuffledMissions[i % shuffledMissions.length];
    const target = mission.id === 'm8' ? players[(i+1) % players.length].id : null;
    return {
      id: p.id,
      name: p.name,
      color: PLAYER_COLORS[i],
      colorName: PLAYER_COLOR_NAMES[i],
      money: 2000,
      units: 10,
      mission: mission.id,
      target,
      position: 'lørenskog',
      checkpoints: { lørenskog: true, lysaker: false, kolbotn: false },
      roundComplete: false,
      diceRoll: null,
      diceUsed: 0,
      eliminated: false,
      conquests: {},
    };
  });

  return {
    phase: 'playing',
    round: 1,
    currentPlayerIdx: 0,
    players: ps,
    territories,
    log: [],
  };
}

function getCurrentPlayer() {
  return gameState?.players[gameState.currentPlayerIdx];
}

function isMyTurn() {
  return getCurrentPlayer()?.id === myPlayerId;
}

function connectWS() {
  const url = document.getElementById('ws-url').value.trim();
  if (!url) return;

  ws = new WebSocket(url);

  ws.onopen = () => {
    document.getElementById('ws-dot').classList.add('connected');
    document.getElementById('ws-status-text').textContent = 'Tilkoblet';
  };

  ws.onclose = () => {
    document.getElementById('ws-dot').classList.remove('connected');
    document.getElementById('ws-status-text').textContent = 'Frakoblet';
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleServerMessage(msg);
  };
}

function sendWS(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(msg));
  }
}

function handleServerMessage(msg) {
  if (msg.type === 'game_state') {
    gameState = msg.state;
    renderGame();
  } else if (msg.type === 'action_result') {
    gameState = msg.state;
    renderGame();
    if (msg.dice) showDiceResult(msg.dice);
  }
}

function createGame() {
  const name = document.getElementById('player-name').value.trim();
  const room = document.getElementById('room-id').value.trim();
  if (!name || !room) return alert('Fyll inn navn og rom-ID');
  myPlayerId = 'p_' + Math.random().toString(36).substr(2,8);
  sendWS({ type: 'create_game', room, player: { id: myPlayerId, name } });
}

function joinGame() {
  const name = document.getElementById('player-name').value.trim();
  const room = document.getElementById('room-id').value.trim();
  if (!name || !room) return alert('Fyll inn navn og rom-ID');
  myPlayerId = 'p_' + Math.random().toString(36).substr(2,8);
  sendWS({ type: 'join_game', room, player: { id: myPlayerId, name } });
}

function startLocalGame() {
  const name = document.getElementById('player-name').value.trim() || 'Spiller 1';
  myPlayerId = 'p1';
  const players = [
    { id: 'p1', name },
    { id: 'p2', name: 'Spiller 2' },
    { id: 'p3', name: 'Spiller 3' },
  ];
  gameState = createInitialGameState(players);
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game-container').style.display = 'block';
  initMap();
}

    <path d="M200 100 Q300 80 400 90 Q500 100 580 130 Q640 155 660 200 Q680 245 665 300 Q650 350 620 390 Q580 430 530 450 Q480 468 420 462 Q360 456 320 440 Q280 424 250 400 Q220 376 205 342 Q190 308 188 270 Q186 232 195 195" fill="none" stroke="#4a3a1a" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.4"/>
    <path d="M160 430 Q200 418 240 410 Q290 400 340 398 Q390 396 430 405 Q470 414 510 430" fill="none" stroke="#4a3a1a" stroke-width="1.2" opacity="0.4"/>
    <path d="M370 145 Q368 180 362 220 Q358 255 352 285 Q346 312 340 355 Q337 380 340 400" fill="none" stroke="#1a4a6a" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
  `;
  svg.appendChild(roads);

  // --- ADJACENCY LINES ---
  const adjGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  adjGroup.setAttribute('id', 'adj-layer');
  const drawn = new Set();
  for (const [tid, neighbors] of Object.entries(ADJACENCY)) {
    const pos1 = TERRITORY_POS[tid];
    if (!pos1) continue;
    for (const nid of neighbors) {
      const key = [tid, nid].sort().join('-');
      if (drawn.has(key)) continue;
      drawn.add(key);
      const pos2 = TERRITORY_POS[nid];
      if (!pos2) continue;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('id', `adj-${key}`);
      line.setAttribute('class', 'adj-line');
      line.setAttribute('x1', pos1[0]); line.setAttribute('y1', pos1[1]);
      line.setAttribute('x2', pos2[0]); line.setAttribute('y2', pos2[1]);
      adjGroup.appendChild(line);
    }
  }
  svg.appendChild(adjGroup);

  // --- CHECKPOINTS ---
  const cpGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  cpGroup.setAttribute('id', 'checkpoint-layer');
  for (const [cid, cp] of Object.entries(CHECKPOINTS)) {
    const [cx, cy] = CHECKPOINT_POS[cid];
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('filter', 'url(#cp-glow)');
    g.innerHTML = `
      <polygon points="${cx},${cy-22} ${cx+16},${cy} ${cx},${cy+22} ${cx-16},${cy}" fill="rgba(255,215,0,0.12)" stroke="#ffd700" stroke-width="1.8"/>
      <circle cx="${cx}" cy="${cy}" r="3.5" fill="#ffd700"/>
      <text class="checkpoint-label" x="${cx}" y="${cy+36}">${cp.name}</text>
      <text class="checkpoint-label" x="${cx}" y="${cy+48}" style="font-size:7px;fill:rgba(255,215,0,0.6)">${cid === 'lørenskog' ? 'START' : 'CHECKPOINT'}</text>
    `;
    cpGroup.appendChild(g);
  }
  svg.appendChild(cpGroup);

  // --- TERRITORY DOTS ---
  const terrGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  terrGroup.setAttribute('id', 'territory-layer');
  for (const t of TERRITORIES) {
    const [cx, cy] = TERRITORY_POS[t.id] || [0, 0];
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('id', 'terr-' + t.id);
    g.setAttribute('class', 'svg-territory');
    g.setAttribute('data-id', t.id);

    const isPremium = t.price >= 400;
    const r = isPremium ? 16 : 14;

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', cx); circle.setAttribute('cy', cy); circle.setAttribute('r', r);
    circle.setAttribute('fill', '#1a1a2a');
    circle.setAttribute('stroke', '#c9a84c');
    circle.setAttribute('stroke-width', isPremium ? '2' : '1.5');

    const nameT = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    nameT.setAttribute('class', 'terr-label');
    nameT.setAttribute('x', cx); nameT.setAttribute('y', cy - 3);
    nameT.textContent = t.name.substring(0, 3).toUpperCase();

    const unitsT = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    unitsT.setAttribute('class', 'terr-units');
    unitsT.setAttribute('x', cx); unitsT.setAttribute('y', cy + 8);
    unitsT.setAttribute('id', 'units-' + t.id);
    unitsT.textContent = t.neutralUnits;

    g.appendChild(circle);
    g.appendChild(nameT);
    g.appendChild(unitsT);

    g.addEventListener('mouseenter', (e) => showMapTooltip(t, e));
    g.addEventListener('mousemove', (e) => moveMapTooltip(e));
    g.addEventListener('mouseleave', hideMapTooltip);
    g.addEventListener('pointerup', () => {
      if (!panState.hasMoved) selectTerritory(t.id);
    });

    terrGroup.appendChild(g);
  }
  svg.appendChild(terrGroup);

  // Compass
  const compass = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  compass.setAttribute('transform', 'translate(840,80)');
  compass.innerHTML = `
    <circle cx="0" cy="0" r="24" fill="rgba(10,10,20,0.75)" stroke="#2a2a3a" stroke-width="1"/>
    <polygon points="0,-20 5,-7 -5,-7" fill="#c9a84c" opacity="0.9"/>
    <polygon points="0,20 5,7 -5,7" fill="#555" opacity="0.6"/>
    <polygon points="-20,0 -7,-5 -7,5" fill="#555" opacity="0.6"/>
    <polygon points="20,0 7,-5 7,5" fill="#555" opacity="0.6"/>
    <text font-family="Georgia,serif" font-size="11" fill="#c9a84c" x="0" y="-26" text-anchor="middle">N</text>
  `;
  svg.appendChild(compass);

  container.appendChild(svg);

  // --- PAN & ZOOM ---
  requestAnimationFrame(() => {
    fitMapToContainer();
    setupMapInteraction(container, svg);
    updateTerritoryVisuals();
    renderHUD();
    renderCheckpointBar();
  });
}

function fitMapToContainer() {
  const container = document.getElementById('map-container');
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  const scale = Math.min(cw / MAP_W, ch / MAP_H) * 0.95;
  mapTransform.scale = scale;
  mapTransform.x = (cw - MAP_W * scale) / 2;
  mapTransform.y = (ch - MAP_H * scale) / 2;
  applyMapTransform();
}

function applyMapTransform() {
  if (!svgEl) return;
  svgEl.style.transform = `translate(${mapTransform.x}px, ${mapTransform.y}px) scale(${mapTransform.scale})`;
}

function setupMapInteraction(container, svg) {
  container.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.svg-territory')) return; // territory handles its own click
    panState.active = true;
    panState.hasMoved = false;
    panState.startX = e.clientX;
    panState.startY = e.clientY;
    panState.lastX = e.clientX;
    panState.lastY = e.clientY;
    panState.startTx = mapTransform.x;
    panState.startTy = mapTransform.y;
    container.classList.add('grabbing');
  });

  window.addEventListener('pointermove', (e) => {
    if (!panState.active) return;
    const dx = e.clientX - panState.startX;
    const dy = e.clientY - panState.startY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) panState.hasMoved = true;
    mapTransform.x = panState.startTx + dx;
    mapTransform.y = panState.startTy + dy;
    applyMapTransform();
    hideMapTooltip();
  });

  window.addEventListener('pointerup', () => {
    panState.active = false;
    container.classList.remove('grabbing');
    setTimeout(() => { panState.hasMoved = false; }, 20);
  });

  // Pinch/wheel zoom
  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = container.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.min(Math.max(mapTransform.scale * delta, 0.3), 4);
    mapTransform.x = mx - (mx - mapTransform.x) * (newScale / mapTransform.scale);
    mapTransform.y = my - (my - mapTransform.y) * (newScale / mapTransform.scale);
    mapTransform.scale = newScale;
    applyMapTransform();
  }, { passive: false });
}

function showMapTooltip(territory, e) {
  const ts = gameState?.territories[territory.id];
  const owner = ts?.owner ? gameState.players.find(x => x.id === ts.owner) : null;
  const district = DISTRICTS[territory.district];
  const tt = document.getElementById('map-tooltip');
  tt.innerHTML = `<strong style="color:#e8c97a">${territory.name}</strong><br>
    <span style="color:#888;font-style:italic">${district?.name}</span><br>
    <span style="color:${owner?.color || '#888'}">${owner?.name || 'Nøytral'}</span> · ${ts?.units || 0} bat.<br>
    <span style="color:#c9a84c">💰 ${territory.price} kr</span>`;
  tt.style.display = 'block';
  moveMapTooltip(e);
}

function moveMapTooltip(e) {
  const tt = document.getElementById('map-tooltip');
  tt.style.left = Math.min(e.clientX + 14, window.innerWidth - 180) + 'px';
  tt.style.top = Math.max(e.clientY - 10, 70) + 'px';
}

function hideMapTooltip() {
  document.getElementById('map-tooltip').style.display = 'none';
}

function updateTerritoryVisuals() {
  if (!gameState) return;
  for (const t of TERRITORIES) {
    const g = document.getElementById('terr-' + t.id);
    if (!g) continue;
    const ts = gameState.territories[t.id];
    const owner = ts?.owner ? gameState.players.find(x => x.id === ts.owner) : null;
    const circle = g.querySelector('circle');

    if (owner) {
      circle.setAttribute('fill', owner.color);
      circle.setAttribute('fill-opacity', '0.75');
      circle.setAttribute('stroke', owner.color);
      circle.setAttribute('filter', '');
    } else {
      circle.setAttribute('fill', '#1a1a2a');
      circle.setAttribute('fill-opacity', '1');
      circle.setAttribute('stroke', '#c9a84c');
      circle.setAttribute('filter', '');
    }

    const unitsEl = document.getElementById('units-' + t.id);
    if (unitsEl) unitsEl.textContent = ts?.units || 0;

    // Selected state
    const isSelected = selectedTerritory === t.id;
    g.classList.toggle('selected', isSelected);
    if (isSelected) circle.setAttribute('filter', 'url(#sel-glow)');

    // Highlight adjacent territories of selected
    if (selectedTerritory) {
      const adj = ADJACENCY[selectedTerritory] || [];
      const key1 = [selectedTerritory, t.id].sort().join('-');
      const adjLine = document.getElementById('adj-' + key1);
      if (adjLine) {
        adjLine.classList.toggle('highlight', adj.includes(t.id));
      }
    }
  }

  // Update district fills based on ownership
  for (const [did] of Object.entries(DISTRICTS)) {
    const terrs = TERRITORIES.filter(t => t.district === did);
    const distEl = document.getElementById('district-' + did);
    if (!distEl) continue;
    // Check if one player owns all territories in district
    const ownerIds = [...new Set(terrs.map(t => gameState.territories[t.id]?.owner).filter(Boolean))];
    if (ownerIds.length === 1 && terrs.every(t => gameState.territories[t.id]?.owner === ownerIds[0])) {
      const owner = gameState.players.find(p => p.id === ownerIds[0]);
      distEl.setAttribute('fill', owner?.color || '#1a1a2a');
      distEl.setAttribute('fill-opacity', '0.4');
    } else {
      distEl.setAttribute('fill', DISTRICTS[did]?.color || '#1a1a2a');
      distEl.setAttribute('fill-opacity', '0.75');
    }
  }
}

function selectTerritory(tid) {
  selectedTerritory = tid;
  // Reset all adj line highlights
  document.querySelectorAll('.adj-line').forEach(l => l.classList.remove('highlight'));
  updateTerritoryVisuals();
  renderActionPanel();
}

function rollDice() {
  if (!isMyTurn()) return;
  const cp = getCurrentPlayer();
  if (cp.diceRoll !== null) return;

  const roll = Math.ceil(Math.random() * 6);
  cp.diceRoll = roll;
  cp.diceUsed = 0;
  addLog(`${cp.name} kastet terning: ${roll} øyne`, 'important');
  renderHUD();
  renderActionPanel();
  sendGameState();
}

function moveToTerritory(tid) {
  if (!isMyTurn()) return;
  const cp = getCurrentPlayer();
  if (cp.diceRoll === null || cp.diceUsed >= cp.diceRoll) return;

  cp.diceUsed++;
  cp.position = tid;

  // Check checkpoints
  if (tid === 'lysaker_cp') cp.checkpoints.lysaker = true;
  if (tid === 'kolbotn_cp') cp.checkpoints.kolbotn = true;

  const t = TERRITORIES.find(x => x.id === tid);
  const ts = gameState.territories[tid];

  addLog(`${cp.name} beveger seg til ${t.name} (${cp.diceUsed}/${cp.diceRoll})`);

  // Land on territory – check if owned by others
  if (cp.diceUsed === cp.diceRoll) {
    if (ts.owner && ts.owner !== cp.id) {
      const owner = gameState.players.find(x => x.id === ts.owner);
      const rent = Math.floor(t.price * 0.15);
      addLog(`${cp.name} lander på ${owner.name}s område. Leie: ${rent} kr`, 'important');
      // Show rent modal
      showRentModal(tid, rent);
    }
  }

  renderCheckpointBar();
  renderActionPanel();
  sendGameState();
}

function buyTerritory(tid) {
  if (!isMyTurn()) return;
  const cp = getCurrentPlayer();
  const t = TERRITORIES.find(x => x.id === tid);
  const ts = gameState.territories[tid];

  if (ts.owner) { addLog('Området er allerede eid'); return; }
  if (cp.money < t.price) { addLog('Ikke nok penger'); return; }
  if (cp.units < 1) { addLog('Ingen bataljoner å plassere'); return; }

  cp.money -= t.price;
  cp.units -= 1;
  ts.owner = cp.id;
  ts.units = 1;

  addLog(`${cp.name} kjøpte ${t.name} for ${t.price} kr`, 'buy');
  updateTerritoryVisuals();
  renderHUD();
  renderActionPanel();
  checkMissionComplete(cp);
  sendGameState();
}

function invadeTerritory(tid) {
  if (!isMyTurn()) return;
  const cp = getCurrentPlayer();
  const ts = gameState.territories[tid];
  const t = TERRITORIES.find(x => x.id === tid);

  if (ts.owner === cp.id) { addLog('Du eier allerede dette området'); return; }
  if (cp.units < 1) { addLog('Ingen bataljoner til invasjon'); return; }

  // Check adjacency
  const ownedNeighbors = ADJACENCY[tid]?.filter(nid => gameState.territories[nid]?.owner === cp.id);
  if (ownedNeighbors.length === 0 && cp.position !== tid) {
    addLog('Du kan bare angripe fra tilstøtende områder du eier');
    return;
  }

  // Risk combat
  const defUnits = ts.units;
  const attUnits = Math.min(cp.units, 3);

  const result = riskCombat(attUnits, defUnits);

  const prevOwner = ts.owner;
  if (result.attackerWins) {
    const oldOwner = prevOwner ? gameState.players.find(x => x.id === prevOwner) : null;
    ts.owner = cp.id;
    ts.units = result.attackerRemaining;
    cp.units -= result.attackerLost;

    if (prevOwner) {
      // Track conquests for Barbaren mission
      if (!cp.conquests[prevOwner]) cp.conquests[prevOwner] = 0;
      cp.conquests[prevOwner]++;
    }

    addLog(`${cp.name} tok ${t.name}! (${prevOwner ? (oldOwner?.name || 'ukjent') : 'nøytral'} tapte)`, 'combat');

    // Check if player is eliminated
    if (prevOwner) {
      const remaining = Object.values(gameState.territories).filter(x => x.owner === prevOwner).length;
      if (remaining === 0) {
        const loser = gameState.players.find(x => x.id === prevOwner);
        if (loser) { loser.eliminated = true; addLog(`${loser.name} er eliminert!`, 'important'); }
        checkGameEnd();
      }
    }
  } else {
    cp.units -= result.attackerLost;
    ts.units = result.defenderRemaining;
    addLog(`${cp.name} angrep ${t.name} – mislyktes!`, 'combat');
  }

  showDiceResult({
    attackerDice: result.attackerDice,
    defenderDice: result.defenderDice,
    attackerName: cp.name,
    defenderName: prevOwner ? gameState.players.find(x => x.id === prevOwner)?.name : 'Nøytral',
    attackerWins: result.attackerWins,
    attackerLost: result.attackerLost,
    defenderLost: result.defenderLost,
  });

  updateTerritoryVisuals();
  renderHUD();
  renderActionPanel();
  checkMissionComplete(cp);
  sendGameState();
}

function riskCombat(attackers, defenders) {
  const aDice = Array.from({length: Math.min(attackers, 3)}, () => Math.ceil(Math.random()*6)).sort((a,b) => b-a);
  const dDice = Array.from({length: Math.min(defenders, 2)}, () => Math.ceil(Math.random()*6)).sort((a,b) => b-a);

  let aLost = 0, dLost = 0;
  const pairs = Math.min(aDice.length, dDice.length);

  for (let i = 0; i < pairs; i++) {
    if (aDice[i] > dDice[i]) dLost++;
    else aLost++;
  }

  return {
    attackerDice: aDice,
    defenderDice: dDice,
    attackerLost: aLost,
    defenderLost: dLost,
    attackerWins: dLost > 0 && defenders - dLost <= 0,
    attackerRemaining: Math.max(1, attackers - aLost),
    defenderRemaining: Math.max(0, defenders - dLost),
  };
}

function reinforceTerritory(tid) {
  if (!isMyTurn()) return;
  const cp = getCurrentPlayer();
  if (cp.units < 1) { addLog('Ingen bataljoner å forsterke med'); return; }

  const ts = gameState.territories[tid];
  if (ts.owner !== cp.id) { addLog('Du eier ikke dette området'); return; }

  cp.units -= 1;
  ts.units += 1;

  const t = TERRITORIES.find(x => x.id === tid);
  addLog(`${cp.name} forsterket ${t.name}`);
  updateTerritoryVisuals();
  renderHUD();
  renderActionPanel();
  sendGameState();
}

function payRent(tid) {
  const cp = getCurrentPlayer();
  const t = TERRITORIES.find(x => x.id === tid);
  const ts = gameState.territories[tid];
  const rent = Math.floor(t.price * 0.15);

  if (cp.money < rent) {
    addLog(`${cp.name} har ikke råd til leie – tvangsangrep!`, 'combat');
    invadeTerritory(tid);
  } else {
    cp.money -= rent;
    const owner = gameState.players.find(x => x.id === ts.owner);
    if (owner) owner.money += rent;
    addLog(`${cp.name} betalte ${rent} kr i leie til ${owner?.name}`, 'buy');
    renderHUD();
    sendGameState();
  }
}

function endTurn() {
  if (!isMyTurn()) { addLog('Det er ikke din tur'); return; }

  const cp = getCurrentPlayer();

  // Collect district bonuses
  let bonusMoney = 0, bonusUnits = 0;
  for (const [did, district] of Object.entries(DISTRICTS)) {
    const terrs = TERRITORIES.filter(t => t.district === did);
    if (terrs.every(t => gameState.territories[t.id]?.owner === cp.id)) {
      bonusMoney += district.bonus.money;
      bonusUnits += district.bonus.units;
    }
  }

  // Checkpoint bonus
  if (cp.checkpoints.lørenskog && cp.checkpoints.lysaker && cp.checkpoints.kolbotn) {
    bonusMoney += 500;
    bonusUnits += 3;
    cp.checkpoints = { lørenskog: true, lysaker: false, kolbotn: false };
    addLog(`${cp.name} fullførte en runde! Bonus: +500 kr +3 bat.`, 'important');
  }

  if (bonusMoney > 0 || bonusUnits > 0) {
    cp.money += bonusMoney;
    cp.units += bonusUnits;
    addLog(`${cp.name} får bonus: +${bonusMoney} kr, +${bonusUnits} bat.`);
  }

  // Reset turn
  cp.diceRoll = null;
  cp.diceUsed = 0;

  // Next player
  let nextIdx = (gameState.currentPlayerIdx + 1) % gameState.players.length;
  while (gameState.players[nextIdx].eliminated) {
    nextIdx = (nextIdx + 1) % gameState.players.length;
  }

  if (nextIdx === 0) gameState.round++;
  gameState.currentPlayerIdx = nextIdx;

  addLog(`--- ${getCurrentPlayer().name}s tur ---`, 'important');
  renderHUD();
  renderActionPanel();
  renderCheckpointBar();
  sendGameState();
}

// ========================================================
// MISSION CHECKING
// ========================================================

function checkMissionComplete(player) {
  const mission = MISSIONS.find(m => m.id === player.mission);
  if (!mission) return;
  if (mission.check(player, gameState)) {
    showWinModal(player, mission);
  }
}

function checkGameEnd() {
  const alive = gameState.players.filter(p => !p.eliminated);
  if (alive.length === 1) {
    showWinModal(alive[0], { title: 'Siste mann stående', emoji: '🏆' });
    return;
  }

  // Check if any mission-based winner (Blodhevn)
  for (const p of alive) {
    const mission = MISSIONS.find(m => m.id === p.mission);
    if (mission?.id === 'm8' && mission.check(p, gameState)) {
      showWinModal(p, mission);
      return;
    }
  }
}

function renderHUD() {
  if (!gameState) return;
  const container = document.getElementById('player-chips');
  container.innerHTML = '';

  for (const p of gameState.players) {
    const chip = document.createElement('div');
    chip.className = 'player-chip' + (p.id === getCurrentPlayer()?.id ? ' active' : '');
    if (p.eliminated) chip.style.opacity = '0.3';
    chip.innerHTML = `
      <div class="chip-dot" style="background:${p.color}"></div>
      <span>${p.name}</span>
      <span class="chip-money">💰 ${p.money}</span>
      <span class="chip-units">⚔ ${p.units}</span>
    `;
    container.appendChild(chip);
  }

  const ind = document.getElementById('turn-indicator');
  const cp = getCurrentPlayer();
  if (cp) {
    ind.innerHTML = `<span style="color:${cp.color}">●</span> ${cp.name}s tur – Runde ${gameState.round}`;
    if (cp.diceRoll !== null) {
      ind.innerHTML += ` | Terning: ${cp.diceRoll} (brukt: ${cp.diceUsed})`;
    }
  }
}

function renderActionPanel() {
  const panel = document.getElementById('action-content');
  if (!selectedTerritory) {
    panel.innerHTML = '<p style="color:var(--text-muted);font-style:italic;font-size:0.9rem;">Velg et område på kartet</p>';

    if (isMyTurn()) {
      const cp = getCurrentPlayer();
      panel.innerHTML += `
        <div style="margin-top:12px;">
          ${cp.diceRoll === null ? `<button class="action-btn" onclick="rollDice()">🎲 Kast terning</button>` : `<div style="color:var(--gold);margin-bottom:8px;">Terning: ${cp.diceRoll} (${cp.diceUsed} brukt)</div>`}
        </div>`;
    }
    return;
  }

  const t = TERRITORIES.find(x => x.id === selectedTerritory);
  const ts = gameState.territories[selectedTerritory];
  const owner = ts.owner ? gameState.players.find(x => x.id === ts.owner) : null;
  const cp = getCurrentPlayer();
  const district = DISTRICTS[t.district];

  panel.innerHTML = `
    <div class="territory-info">
      <div class="territory-name">${t.name}</div>
      <div class="territory-district">${district.name}</div>
      <div class="territory-stats">
        <div class="stat"><span class="stat-label">Eier</span><span style="color:${owner?.color || '#888'}">${owner?.name || 'Nøytral'}</span></div>
        <div class="stat"><span class="stat-label">Bataljoner</span><span>${ts.units}</span></div>
        <div class="stat"><span class="stat-label">Pris</span><span style="color:var(--gold)">${t.price} kr</span></div>
      </div>
    </div>
    <div class="action-buttons">
  `;

  if (isMyTurn()) {
    const myTerr = ts.owner === cp.id;
    const neutral = !ts.owner;
    const enemy = ts.owner && ts.owner !== cp.id;
    const adjacent = ADJACENCY[selectedTerritory]?.some(nid => gameState.territories[nid]?.owner === cp.id);

    if (!myTerr) {
      panel.innerHTML += `
        <button class="action-btn" onclick="buyTerritory('${t.id}')" ${!neutral || cp.money < t.price ? 'disabled' : ''}>
          Kjøp av bank <span class="price">${t.price} kr</span>
        </button>
        <button class="action-btn" onclick="invadeTerritory('${t.id}')" ${!adjacent && cp.position !== t.id ? 'disabled' : ''}>
          ⚔ Invader ${enemy ? `(${ts.units} bat.)` : `(nøytral: ${ts.units} bat.)`}
        </button>
      `;
    } else {
      panel.innerHTML += `
        <button class="action-btn" onclick="reinforceTerritory('${t.id}')" ${cp.units < 1 ? 'disabled' : ''}>
          + Forsterke <span class="price">${cp.units} tilgjengelig</span>
        </button>
      `;
    }

    // Move button
    if (cp.diceRoll !== null && cp.diceUsed < cp.diceRoll) {
      panel.innerHTML += `<button class="action-btn" onclick="moveToTerritory('${t.id}')">🚶 Beveg hit (${cp.diceUsed+1}/${cp.diceRoll})</button>`;
    }
  }

  panel.innerHTML += '</div>';
}

function renderCheckpointBar() {
  if (!gameState) return;
  const cp = getCurrentPlayer();
  if (!cp) return;

  ['lørenskog','lysaker','kolbotn'].forEach(cid => {
    const el = document.getElementById(`cp-${cid}`);
    if (el) el.className = 'checkpoint' + (cp.checkpoints[cid] ? ' reached' : '');
  });
}

function addLog(msg, type = '') {
  if (!gameState) return;
  gameState.log = gameState.log || [];
  gameState.log.unshift({ msg, type, time: new Date().toLocaleTimeString('no', {hour:'2-digit',minute:'2-digit'}) });
  if (gameState.log.length > 50) gameState.log.pop();

  const container = document.getElementById('log-entries');
  if (container) {
    container.innerHTML = gameState.log.slice(0, 30).map(e =>
      `<div class="log-entry ${e.type}">${e.msg}</div>`
    ).join('');
  }
}

function renderGame() {
  renderHUD();
  renderActionPanel();
  renderCheckpointBar();
  updateTerritoryVisuals();
}

// ========================================================
// DICE DISPLAY
// ========================================================

function showDiceResult(result) {
  const el = document.getElementById('dice-display');
  el.style.display = 'block';

  document.getElementById('attacker-name').textContent = result.attackerName || 'Angriper';
  document.getElementById('defender-name').textContent = result.defenderName || 'Forsvarer';

  const DICE_FACES = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
  document.getElementById('attacker-dice').innerHTML = (result.attackerDice || []).map(d =>
    `<div class="die attacker">${DICE_FACES[d]}</div>`
  ).join('');
  document.getElementById('defender-dice').innerHTML = (result.defenderDice || []).map(d =>
    `<div class="die defender">${DICE_FACES[d]}</div>`
  ).join('');

  document.getElementById('dice-result').textContent = result.attackerWins
    ? `✅ Angriperen vinner! Forsvarer tapte ${result.defenderLost} bat.`
    : `❌ Angrepet mislyktes. Angriper tapte ${result.attackerLost} bat.`;
}

function closeDice() {
  document.getElementById('dice-display').style.display = 'none';
}

// ========================================================
// MODALS
// ========================================================

function showRentModal(tid, rent) {
  const t = TERRITORIES.find(x => x.id === tid);
  const cp = getCurrentPlayer();
  const canPay = cp.money >= rent;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>Leie</h2>
      <p>Du landet på <strong>${t.name}</strong>.<br>Leie: <span style="color:var(--gold)">${rent} kr</span></p>
      ${!canPay ? '<p style="color:#e87070">Du har ikke råd! Tvangsangrep igangsettes.</p>' : ''}
      <button class="btn primary" onclick="this.closest('.modal-overlay').remove(); payRent('${tid}')">
        ${canPay ? `Betal ${rent} kr` : 'Angrip i stedet'}
      </button>
    </div>
  `;
  document.body.appendChild(overlay);
}

function showWinModal(player, mission) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal end-game-modal">
      <h2>🏆 Spillet er over!</h2>
      <div class="winner" style="color:${player.color}">${player.name} vinner!</div>
      <p>${mission.emoji || ''} <strong>${mission.title}</strong><br>${mission.desc || ''}</p>
      <button class="btn primary" onclick="location.reload()">Nytt spill</button>
    </div>
  `;
  document.body.appendChild(overlay);
}

// Mission card toggle
document.getElementById('mission-card').addEventListener('click', () => {
  const el = document.getElementById('mission-text');
  const myPlayer = gameState?.players.find(p => p.id === myPlayerId);
  if (!myPlayer) return;

  if (!missionRevealed) {
    missionRevealed = true;
    const mission = MISSIONS.find(m => m.id === myPlayer.mission);
    el.classList.remove('mission-hidden');
    el.textContent = `${mission?.emoji} ${mission?.title}: ${mission?.desc}`;
    if (mission?.id === 'm8' && myPlayer.target) {
      const target = gameState.players.find(p => p.id === myPlayer.target);
      el.textContent += ` (Mål: ${target?.name})`;
    }
  } else {
    missionRevealed = false;
    el.classList.add('mission-hidden');
    el.textContent = 'Klikk for å se';
  }
});

// ========================================================
// WEBSOCKET SYNC
// ========================================================

function sendGameState() {
  sendWS({ type: 'game_action', state: gameState });
}

// ========================================================
// RESIZE
// ========================================================

window.addEventListener('resize', () => {
  if (svgEl) fitMapToContainer();
});
</script>
